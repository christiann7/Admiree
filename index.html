  <body>
    <header id="main">
      <h1>Hi kape tayo</h1>

    <main>
      <canvas id="confetti-canvas"></canvas>

      <div class="gif-container">
        <img id="gif" src="pls2.gif" alt="Please" />
      </div>
      <div class="button-container">
        <button id="no-button">Ayoko</button>
        <button id="yes-button">Sige</button>
      </div>

      <div id="details-form-container" class="details-form-container hidden">
        <h2>Nice! Tell me more</h2>
        <form id="details-form">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" placeholder="Enter your name" required />

          <label for="place">San mo gusto?</label>
          <input type="text" id="place" name="place" placeholder="Enter a place" required />

          <label for="travel-date">Preferred date</label>
          <input type="date" id="travel-date" name="travelDate" required />

          <button type="submit" id="submit-details">Send</button>
        </form>
        <p id="form-message" class="form-message" aria-live="polite"></p>
      </div>
    </main>
